version: "3.8"

services:
  nexus:
    build: .
    container_name: nexus-command-center
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - nexus-data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=/app/data/nexus.db
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  nexus-data:
    driver: local
